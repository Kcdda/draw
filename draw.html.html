<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #target { background: #fff; }
    </style>
</head>
<body>
<div id="target"></div>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const kanji = urlParams.get('kanji') || '火';
    const writer = HanziWriter.create('target', kanji, {
        width: 300, height: 300, padding: 20,
        showOutline: true, showHintAfterMisses: 2, strokeAnimationSpeed: 1,
        quiz: {
            onComplete: function(summaryData) {
                const totalMistakes = summaryData.mistakesOnStroke.reduce((a, b) => a + b, 0);
                const accuracy = Math.max(0, 100 - (totalMistakes * 5));
                // Отправляем точность в RPG Maker
                window.parent.postMessage({ accuracy: accuracy }, '*');
            }
        }
    });
    writer.quiz();
</script>
</body>
</html>
